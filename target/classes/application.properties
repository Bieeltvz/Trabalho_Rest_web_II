# Arquivo de configuração Spring Boot.
# Configuração de conexão com o MariaDB (ajuste usuário/senha conforme seu ambiente)
spring.datasource.url=jdbc:mariadb://localhost:3306/teste?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# Não deixar o Hibernate alterar o schema - já existe no banco
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# Comentário: configuração adicionada para conectar ao banco 'teste' no MariaDB.
server.port=9090
